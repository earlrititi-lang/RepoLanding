<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Demo actualizada de bandera ondulante con Three.js moderno y Vite."
  >
  <title>Bandera ondulante en Three.js</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!--
    Este contenedor es el unico nodo del DOM que necesita la escena.

    script.js busca [data-flag-stage], crea dentro un canvas WebGL y usa el
    tamano real de este bloque para sincronizar renderer y camara.

    Si el efecto se quiere mover a otra web, lo minimo que hay que copiar es:
    1. un contenedor equivalente,
    2. la hoja de estilos del contenedor,
    3. script.js,
    4. image.png.
  -->
  <div
    class="fullscreen-stage"
    data-flag-stage
    aria-label="Escena 3D de bandera ondulante"
  ></div>

  <!--
    La demo ya no depende de window.THREE ni de scripts clasicos.
    Vite resuelve el import de Three.js desde script.js usando ES modules.
  -->
  <script type="module" src="./script.js"></script>
</body>
</html>
