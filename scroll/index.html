<!DOCTYPE html>
<html lang="es">
  <head>
    <!--
      UTF-8 permite usar caracteres del espanol y otros simbolos sin problemas.
    -->
    <meta charset="UTF-8" />

    <!--
      Esta meta hace que la maqueta se adapte correctamente al ancho real
      del dispositivo, especialmente en movil.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Titulo de la pestana del navegador.
    -->
    <title>Estructura base</title>

    <!--
      Enlazamos la hoja de estilos principal de esta pantalla.
    -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      "escena" es el lienzo principal de la composicion.
      Aqui metemos tanto las lineas decorativas como el bloque del video.
    -->
    <main class="escena">
      <!--
        Estas tres lineas verticales no tienen contenido.
        Solo sirven para construir la reticula visual del fondo.
      -->
      <div class="linea linea-1"></div>
      <div class="linea linea-2"></div>
      <div class="linea linea-3"></div>

      <!--
        Este section envuelve al video.
        No usamos el <video> suelto porque nos interesa controlar:
        - su tamano inicial
        - el recorte
        - la transicion hacia pantalla completa visual
      -->
      <section class="bloque-video">
        <!--
          autoplay:
          intenta reproducir el video automaticamente al cargar la pagina.

          muted:
          es clave para que autoplay funcione en la mayoria de navegadores.

          loop:
          al terminar, el video vuelve a empezar.

          playsinline:
          evita que en algunos moviles el navegador fuerce fullscreen nativo.
        -->
        <video class="video-central" autoplay muted loop playsinline>
          <!--
            Fuente del archivo de video.
            Si mas adelante cambias el archivo, basta con actualizar esta ruta.
          -->
          <source src="./assets/video-1080p.mp4" type="video/mp4" />

          <!--
            Texto de respaldo para navegadores que no soporten la etiqueta <video>.
          -->
          Tu navegador no soporta la etiqueta de video.
        </video>
      </section>
    </main>

    <!--
      El JavaScript se carga al final para que el HTML ya exista
      cuando el script intente buscar elementos en la pagina.
    -->
    <script src="./script.js"></script>
  </body>
</html>
