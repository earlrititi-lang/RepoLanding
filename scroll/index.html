<!DOCTYPE html>
<html lang="es">
  <head>
    <!--
      ------------------------------------------------------------
      BLOQUE 1. CONFIGURACION BASICA DEL DOCUMENTO
      ------------------------------------------------------------

      Este archivo HTML tiene una mision muy concreta:
      montar la estructura minima necesaria para crear un efecto visual
      donde un video nace dentro de la pantalla de una tele del asset
      tracking_tv_def.svg, la composicion hace zoom hasta que ese video
      ocupa el viewport y, despues, queda cubierto por seis barras negras.

      No hay texto, botones ni contenido adicional porque la intencion
      visual es que toda la atencion recaiga en el gesto del scroll
      y en el acercamiento progresivo hacia su pantalla.

      meta charset="UTF-8":
      permite que el navegador interprete correctamente caracteres
      especiales y simbolos.

      meta viewport:
      indica al navegador movil que use el ancho real del dispositivo.
      Sin esta etiqueta, el tamano del viewport podria no coincidir
      con el espacio fisico disponible y la expansion del video
      no se sentiria correcta.
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Titulo de la pestana del navegador.
      No afecta al efecto visual, pero forma parte de la configuracion
      minima correcta de cualquier documento HTML.
    -->
    <title>Estructura base</title>

    <!--
      Hoja de estilos principal.

      En este CSS definimos:
      - la altura especial de la escena para generar scroll
      - la composicion de fondo de la tele
      - el bloque de video que nace dentro del hueco verde del SVG
      - la capa final de barras negras

      El CSS prepara la escena; luego JavaScript y GSAP se encargan
      de animarla.
    -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      ------------------------------------------------------------
      BLOQUE 2. CONTENEDOR GENERAL DEL EFECTO
      ------------------------------------------------------------

      "escena" es el contenedor superior del montaje.

      Su papel no es simplemente envolver elementos:
      tambien crea un recorrido de scroll artificialmente largo.

      ¿Por que necesitamos eso?
      Porque el crecimiento del video ya no sucede por tiempo
      como en la version anterior de los 3 segundos, sino por scroll.

      Eso significa que necesitamos "distancia de scroll" para convertirla
      en "progreso de animacion".

      En otras palabras:
      - el usuario desplaza la rueda o arrastra con el dedo
      - ScrollTrigger mide cuanto ha avanzado ese scroll
      - GSAP usa ese avance para acercar la composicion poco a poco
    -->
    <main class="escena">
      <!--
        ----------------------------------------------------------
        BLOQUE 3. ZONA QUE SE VA A QUEDAR FIJA
        ----------------------------------------------------------

        "escena__pin" es la parte realmente visible durante el efecto.

        ScrollTrigger la "pinea", es decir, la deja fijada temporalmente
        en pantalla mientras el usuario sigue haciendo scroll.

        Ese detalle es crucial:
        queremos que el usuario sienta que la pantalla no cambia de escena
        ni baja a otro contenido, sino que el mismo encuadre permanece
        delante de sus ojos mientras solo evoluciona el video.

        Si no existiera este contenedor pineado, al hacer scroll
        la pagina seguiria desplazandose normalmente y el efecto perderia
        mucha claridad visual.
      -->
      <div class="escena__pin">
        <!--
          --------------------------------------------------------
          BLOQUE 4. COMPOSICION DE FONDO
          --------------------------------------------------------

          Esta capa muestra el asset de la tele.

          En ese SVG hay una segunda capa de referencia pintada en verde.
          Esa capa no se usa visualmente en la pagina final, pero si nos
          sirve como "plano tecnico": de ahi salen las coordenadas exactas
          de la pantalla donde debe empezar el video.

          No la ponemos como background-image del contenedor completo,
          sino dentro de un elemento propio, para poder:
          - conservar su proporcion real
          - centrarlo correctamente
          - medir despues su area visible desde JavaScript

          Esa medicion es la que permite colocar el video exactamente
          donde el SVG marca el hueco verde de referencia.
        -->
        <!--
          --------------------------------------------------------
          BLOQUE 5. ESCENA ESCALABLE DE TRACKING
          --------------------------------------------------------

          Este contenedor agrupa dos piezas que deben moverse juntas:
          - la imagen de la tele
          - el video colocado dentro de su pantalla

          La razon de esta agrupacion es el cambio de enfoque que acabas
          de pedir: ya no queremos que "crezca el video", sino que toda
          la composicion haga zoom como si una camara se acercara.

          Al animar este bloque completo, la tele y el video conservan
          su relacion geometrica en todo momento.
        -->
        <div class="tracking-stage">
          <div class="tracking-marco" aria-hidden="true">
            <img class="tracking-bg" src="./assets/tracking_tv_def.svg" alt="" />
          </div>

          <!--
            ------------------------------------------------------
            BLOQUE 6. MARCO DEL VIDEO
            ------------------------------------------------------

            Este <section> ya no se anima hacia fullscreen por si mismo.
            Ahora cumple otra funcion:
            colocarse exactamente sobre la pantalla de la tele
            para que, cuando la escena completa haga zoom,
            el video llegue a fullscreen como consecuencia
            del acercamiento del fondo.

            JavaScript calcula esa caja usando las coordenadas reales
            del asset. El proceso es este:
            1. se leen los porcentajes medidos del hueco verde
            2. se mide el tamano real del SVG ya escalado en pantalla
            3. se traduce ese hueco al sistema de coordenadas visible

            Asi, aunque el asset crezca o recorte por los bordes,
            el video sigue alineado con su pantalla.
          -->
          <section class="bloque-video">
            <!--
              ----------------------------------------------------
              BLOQUE 7. ETIQUETA VIDEO
              ----------------------------------------------------

              autoplay:
              intenta reproducir el video automaticamente al cargar.

              muted:
              es esencial para que autoplay funcione en la mayoria
              de navegadores actuales.

              loop:
              al llegar al final, el video vuelve a empezar.

              playsinline:
              evita que algunos moviles fuercen fullscreen nativo,
              ya que aqui queremos controlar nosotros el efecto visual
              dentro de la pagina.
            -->
            <video class="video-central" autoplay muted loop playsinline>
              <!--
                Fuente del archivo de video.
                Si en el futuro cambias el archivo, normalmente bastaria
                con sustituir esta ruta.
              -->
              <source src="./assets/video-1080p.mp4" type="video/mp4" />

              <!--
                Texto de respaldo por si el navegador no soporta <video>.
              -->
              Tu navegador no soporta la etiqueta de video.
            </video>
          </section>
        </div>

        <!--
          --------------------------------------------------------
          BLOQUE 8. BARRAS NEGRAS EN ESCALERA
          --------------------------------------------------------

          En lugar de una sola cortina negra, aqui usamos seis barras
          verticales. Cada una aparece con un pequeno retraso respecto
          a la anterior, de izquierda a derecha.

          El resultado visual se parece a unas persianas o columnas negras
          que entran en secuencia una vez el video ya ha llegado
          a pantalla completa.

          Como cada barra termina cubriendo un sexto del ancho,
          al final de la secuencia el viewport queda completamente negro.
        -->
        <div class="barras-negras" aria-hidden="true">
          <span class="barra-negra barra-negra-1"></span>
          <span class="barra-negra barra-negra-2"></span>
          <span class="barra-negra barra-negra-3"></span>
          <span class="barra-negra barra-negra-4"></span>
          <span class="barra-negra barra-negra-5"></span>
          <span class="barra-negra barra-negra-6"></span>
        </div>
      </div>
    </main>

    <!--
      ------------------------------------------------------------
      BLOQUE 9. LIBRERIAS Y SCRIPT DEL PROYECTO
      ------------------------------------------------------------

      GSAP:
      es el motor de animacion. Cambia propiedades CSS de forma
      fluida, eficiente y muy controlable.

      ScrollTrigger:
      es un plugin de GSAP que conecta una animacion con el scroll.
      Gracias a el, el acercamiento de la escena ya no depende del tiempo,
      sino del avance real del usuario.

      script.js:
      contiene la logica que une la estructura HTML con la animacion.

      Los scripts se colocan al final del body para asegurarnos de que
      el DOM ya esta construido cuando JavaScript intente seleccionar
      los elementos con querySelector.
    -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/ScrollTrigger.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
