<!DOCTYPE html>
<html lang="es">
  <head>
   
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estructura base</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      BLOQUE 2: contenedor principal

      Este contenedor ocupa toda la pantalla.
      Dentro colocaremos las líneas verticales.
    -->
    <main class="escena">
     
      <div class="linea linea-1"></div>
      <div class="linea linea-2"></div>
      <div class="linea linea-3"></div>

      <!--
        BLOQUE 4: bloque del vídeo

        Este contenedor será el rectángulo pequeño
        que aparece en la zona central.

        Dentro colocamos la etiqueta <video>.
      -->
      <section class="bloque-video">
        <!--
          autoplay: inicia el vídeo automáticamente
          muted: necesario para que autoplay funcione en muchos navegadores
          loop: cuando termina, vuelve a empezar
          playsinline: en móvil evita la pantalla completa automática

          Cuando metas tu archivo, puedes llamarlo "video.mp4"
          o cambiar la ruta src por el nombre real.
        -->
        <video class="video-central" autoplay muted loop playsinline>
          <source src="./assets/video-1080p.mp4" type="video/mp4" />
          Tu navegador no soporta la etiqueta de vídeo.
        </video>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
